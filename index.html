<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFXIV Wiki Pro Max</title>
<meta name="description" content="FFXIV 攻略 Wiki｜新手、高難、副本、工具完整資料庫">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#e5e7eb;display:flex}

.sidebar{width:260px;background:#020617;height:100vh;overflow:auto;padding:20px}
.sidebar a{display:block;padding:8px;border-radius:6px;color:#cbd5f5;text-decoration:none}
.sidebar a:hover{background:#1e293b}

.main{flex:1;display:flex}
.content{flex:3;padding:30px;overflow:auto}
.toc{flex:1;border-left:1px solid #1e293b;padding:20px;max-width:250px}

.toc a{display:block;color:#94a3b8;text-decoration:none;font-size:14px;margin-bottom:6px}
.toc a:hover{color:#60a5fa}

.article h1{font-size:28px}
.article h2{margin-top:24px}

.search{width:100%;padding:8px;margin-bottom:10px;border-radius:6px;border:none}

@media(max-width:900px){
 body{flex-direction:column}
 .main{flex-direction:column}
 .toc{display:none}
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>FFXIV Wiki</h2>
  <input class="search" id="search" placeholder="搜尋文章...">
  <div id="menu"></div>
</div>

<div class="main">
  <div class="content">
    <div class="article" id="content">Loading...</div>
  </div>
  <div class="toc" id="toc">
    <h3>目錄</h3>
    <div id="tocList"></div>
  </div>
</div>

<script>
const ARTICLES = [
  {title:"新手入坑指南", slug:"beginner"},
  {title:"高難副本攻略", slug:"savage"}
];

function renderMenu(list){
 const menu=document.getElementById('menu');
 menu.innerHTML='';
 list.forEach(a=>{
   const el=document.createElement('a');
   el.textContent=a.title;
   el.href='?page='+a.slug;
   menu.appendChild(el);
 });
}

async function loadArticle(slug){
 const res=await fetch('articles/'+slug+'.md');
 const text=await res.text();
 const html=marked.parse(text);
 document.getElementById('content').innerHTML=html;
 generateTOC();
}

function generateTOC(){
 const toc=document.getElementById('tocList');
 toc.innerHTML='';
 document.querySelectorAll('.article h2').forEach((h,i)=>{
   const id='sec'+i;
   h.id=id;
   const a=document.createElement('a');
   a.textContent=h.innerText;
   a.href='#'+id;
   toc.appendChild(a);
 });
}

function getQuery(){
 const params=new URLSearchParams(location.search);
 return params.get('page')||'beginner';
}

// 搜尋
document.getElementById('search').addEventListener('input',e=>{
 const k=e.target.value.toLowerCase();
 renderMenu(ARTICLES.filter(a=>a.title.toLowerCase().includes(k)));
});

// 初始化
renderMenu(ARTICLES);
loadArticle(getQuery());
</script>

</body>
</html>
